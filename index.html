<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price in OMR</title>
</head>
<body>
  <h1>Live Gold Price</h1>
  <p>Gold (1 oz): <span id="gold-omr">Loading...</span> OMR</p>

  <script>
    async function getGoldPrice() {
      try {
        const res = await fetch('https://metals-api.com/api/latest?access_key=YOUR_API_KEY&base=XAU&symbols=OMR');
        const data = await res.json();
        const price = data.rates.OMR;
        document.getElementById('gold-omr').innerText = price.toFixed(2);
      } catch (err) {
        document.getElementById('gold-omr').innerText = 'Error loading data';
        console.error(err);
      }
    }

    getGoldPrice();
    setInterval(getGoldPrice, 60000); // refresh every 60 seconds
  </script>
</body>
</html>
