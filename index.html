<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة ذكية بمؤثرات حية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 1. حركة حية وانسيابية للخلفية المتغيرة الألوان */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #121225, #1e1e3f, #252542, #14142b);
            background-size: 400% 400%;
            animation: gradientAnimation 12s ease infinite;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. تأثير ظهور الحاسبة بشكل انسيابي عند تحميل الصفحة */
        .calculator-container {
            display: flex;
            background: rgba(18, 18, 37, 0.85);
            backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي Modern Glassmorphism */
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(88, 86, 214, 0.1);
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateY(30px);
            opacity: 0;
            animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes floatUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* جسم الآلة الحاسبة */
        .calculator {
            width: 300px;
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8f8fbf;
            margin-bottom: 15px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .history-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #ffffff;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: auto;
            width: auto;
        }

        .history-btn:hover {
            transform: scale(1.2) rotate(-10deg);
        }

        /* شاشة العرض مع توهج خفيف عند التركيز */
        .display {
            width: 100%;
            height: 85px;
            background-color: #1a1a35;
            border: 1px solid rgba(255, 255, 255, 0.03);
            outline: none;
            border-radius: 18px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 2.2rem;
            text-align: left;
            padding: 15px;
            direction: ltr;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* شبكة الأزرار */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* تأثيرات حية للأزرار عند التمرير والضغط */
        button {
            height: 58px;
            border: none;
            outline: none;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #222244;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background-color: #2e2e5c;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* ألوان العمليات الحسابية وتأثير توهجها */
        .operator { background-color: #ff9f0a; color: #ffffff; }
        .operator:hover { 
            background-color: #ffb033;
            box-shadow: 0 0 15px rgba(255, 159, 10, 0.4);
        }

        .clear { background-color: #ff3b30; color: #ffffff; }
        .clear:hover { 
            background-color: #ff5349;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        .delete { background-color: #5856d6; color: #ffffff; }
        .delete:hover { 
            background-color: #6e6ccf;
            box-shadow: 0 0 15px rgba(88, 86, 214, 0.4);
        }

        .equal {
            background-color: #34c759;
            color: #ffffff;
            grid-column: span 2;
        }
        .equal:hover { 
            background-color: #4cd964;
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.5);
        }

        /* لوحة سجل العمليات المنسدلة بسلاسة */
        .history-panel {
            width: 0;
            opacity: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: 0px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .history-panel.open {
            width: 250px;
            opacity: 1;
            border-right: 2px solid rgba(255, 255, 255, 0.05);
            padding-right: 15px;
        }

        .history-panel h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history-btn {
            font-size: 0.8rem;
            padding: 6px 12px;
            height: auto;
            background-color: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border: 1px solid #ff3b30;
            border-radius: 8px;
        }
        .clear-history-btn:hover {
            background-color: #ff3b30;
            color: #fff;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 330px;
            direction: ltr;
            text-align: right;
        }

        /* حركة ظهور عناصر السجل واحد تلو الآخر */
        .history-list li {
            background-color: #1a1a35;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #8f8fbf;
            font-size: 0.95rem;
            border: 1px solid transparent;
            animation: fadeInItem 0.3s ease forwards;
        }

        @keyframes fadeInItem {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .history-list li:hover {
            background-color: #222244;
            color: #ffffff;
            border-color: rgba(255,255,255,0.05);
            transform: scale(1.02);
        }

        .history-list li .result {
            color: #34c759;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin-top: 4px;
        }

        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-thumb {
            background: #222244;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        
        <div class="calculator">
            <div class="calc-header">
                <span>حاسبة حية ذكية</span>
                <button class="history-btn" onclick="toggleHistory()" title="سجل العمليات">📜</button>
            </div>
            
            <input type="text" class="display" id="display" readonly placeholder="0">
            
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="delete" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendValue('%')">%</button>
                <button class="operator" onclick="appendValue('/')">÷</button>

                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button class="operator" onclick="appendValue('*')">×</button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button class="operator" onclick="appendValue('-')">-</button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button class="operator" onclick="appendValue('+')">+</button>

                <button onclick="appendValue('0')">0</button>
                <button onclick="appendValue('.')">.</button>
                <button class="equal" onclick="calculate()">=</button>
            </div>
        </div>

        <div class="history-panel" id="historyPanel">
            <h3>
                <span>السجل</span>
                <button class="clear-history-btn" onclick="clearHistory()">مسح</button>
            </h3>
            <ul class="history-list" id="historyList">
                </ul>
        </div>

    </div>

    <script>
        const display = document.getElementById('display');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');

        function toggleHistory() {
            historyPanel.classList.toggle('open');
        }

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                let expression = display.value;
                if (expression) {
                    let result = eval(expression);
                    
                    // تحسين شكل النتيجة وإضافتها للسجل
                    addToHistory(expression, result);
                    display.value = result;
                }
            } catch (error) {
                display.value = 'خطأ';
                setTimeout(clearDisplay, 1500);
            }
        }

        function addToHistory(expr, res) {
            const li = document.createElement('li');
            let cleanExpr = expr.replace(/\*/g, '×').replace(/\//g, '÷');
            
            li.innerHTML = `${cleanExpr} = <span class="result">${res}</span>`;
            
            li.onclick = function() {
                display.value = res;
                // إعطاء شاشة العرض وميض خاطف عند استدعاء رقم قديم كحركة تفاعلية
                display.style.boxShadow = "0 0 15px rgba(52, 199, 89, 0.4)";
                setTimeout(() => { display.style.boxShadow = "inset 0 4px 10px rgba(0,0,0,0.3)"; }, 300);
            };

            historyList.insertBefore(li, historyList.firstChild);
        }

        function clearHistory() {
            historyList.innerHTML = '';
        }
    </script>

</body>
</html>
