<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Gold Price in OMR</title>
</head>
<body>
  <h1>Current Gold Price in Oman</h1>
  <p>24K Gold: <span id="gold-price">Loading...</span> OMR per gram</p>

  <script>
    async function fetchGoldPrice() {
      try {
        const response = await fetch('https://api.exchangerate-api.com/v4/latest/OMR');
        const data = await response.json();
        const goldPriceUSD = 107.01; // Example: Gold price in USD per gram
        const exchangeRate = data.rates.USD;
        const goldPriceOMR = (goldPriceUSD / exchangeRate).toFixed(2);
        document.getElementById('gold-price').textContent = goldPriceOMR;
      } catch (error) {
        console.error('Error fetching gold price:', error);
        document.getElementById('gold-price').textContent = 'Error fetching data';
      }
    }

    fetchGoldPrice();
  </script>
</body>
</html>
