<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price in OMR</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #ffefba, #ffffff);
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #d4af37;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5em;
      background-color: #f9f9f9;
      display: inline-block;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    span#gold-omr {
      font-weight: bold;
      color: #b8860b;
    }
  </style>
</head>
<body>
  <h1>Live Gold Price</h1>
  <p>Gold (1 oz): <span id="gold-omr">Loading...</span> OMR</p>

  <script>
  async function getGoldPrice() {
  try {
    const response = await fetch('https://api.metals.dev/v1/latest?api_key=RC5DAHULXR51VMJ8QTAL126J8QTAL&currency=USD&unit=toz');
    const data = await response.json();

    console.log("API Response:", data); // 👈 See what's actually returned

    const goldPriceUSD = data.rates.XAU; // might be undefined if data.rates doesn't exist

    const exchangeResponse = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const exchangeData = await exchangeResponse.json();
    const usdToOmr = exchangeData.rates.OMR;

    const goldPriceOMR = goldPriceUSD * usdToOmr;
    document.getElementById('gold-omr').innerText = goldPriceOMR.toFixed(2);
  } catch (error) {
    console.error("Error fetching gold price:", error);
    document.getElementById('gold-omr').innerText = 'Error loading data';
  }
}

  getGoldPrice();
  setInterval(getGoldPrice, 1500); // refresh every 1 seconds
</script>
</body>
</html>
