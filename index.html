<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price in OMR</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #ffefba, #ffffff);
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #d4af37;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5em;
      background-color: #f9f9f9;
      display: inline-block;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    span#gold-omr {
      font-weight: bold;
      color: #b8860b;
    }
  </style>
</head>
<body>
  <h1>Live Gold Price</h1>
  <p>Gold (1 oz): <span id="gold-omr">Loading...</span> OMR</p>

  <script>
    async function getGoldPrice() {
      try {
        const response = await fetch('https://api.metals.dev/v1/latest?api_key=RC5DAHULXR51VMJ8QTAL126J8QTAL&currency=OMR&unit=toz');
        const data = await response.json();
        const price = data.rates.XAU; // XAU is the symbol for gold
        document.getElementById('gold-omr').innerText = price.toFixed(2);
      } catch (err) {
        document.getElementById('gold-omr').innerText = 'Error loading data';
        console.error(err);
      }
    }

    getGoldPrice();
    setInterval(getGoldPrice, 60000); // refresh every 60 seconds
  </script>
</body>
</html>
