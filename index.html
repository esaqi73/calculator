<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price in OMR</title>
</head>
<body>
  <h1>Live Gold Price</h1>
  <p>Gold (1 oz): <span id="gold-omr">Loading...</span> OMR</p>

  <script>
    async function getGoldPrice() {
      try {
        const response = await fetch('https://api.metals.dev/v1/latest?api_key=RC5DAHULXR51VMJ8QTAL126J8QTAL&currency=OMR&unit=toz');
        const data = await response.json();
        const price = data.rates.XAU; // Assuming gold is listed under "XAU"
        document.getElementById('gold-omr').innerText = price.toFixed(2);
      } catch (err) {
        document.getElementById('gold-omr').innerText = 'Error loading data';
        console.error(err);
      }
    }

    getGoldPrice();
    setInterval(getGoldPrice, 60000); // refresh every 60 seconds
  </script>
</body>
</html>
